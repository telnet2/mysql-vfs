services:
  mysql:
    image: mysql:8.0
    container_name: cc-vfs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vfs
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - cc-vfs-network

  localstack:
    image: localstack/localstack:latest
    container_name: cc-vfs-localstack
    environment:
      SERVICES: s3
      DEBUG: 1
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "awslocal", "s3", "ls"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cc-vfs-network

  nats:
    image: nats:2.10-alpine
    container_name: cc-vfs-nats
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # HTTP monitoring
    command: ["-js", "-m", "8222"]  # Enable JetStream and monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - cc-vfs-network

  vfs-service:
    build:
      context: .
      dockerfile: services/vfs/Dockerfile
      secrets:
        - git-credentials
    container_name: cc-vfs-service
    depends_on:
      mysql:
        condition: service_healthy
      localstack:
        condition: service_started
      nats:
        condition: service_healthy
    volumes:
      - ./conf/config.local.yaml:/app/config.yaml:ro
    environment:
      # AWS credentials for LocalStack (required by AWS SDK)
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_FORCE_PATH_STYLE: "true"
    command: ["./vfs-service", "--conf", "/app/config.yaml"]
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cc-vfs-network
    restart: unless-stopped

  webhook-daemon:
    image: almir/webhook:latest
    container_name: cc-vfs-webhook-daemon
    volumes:
      - ./conf/webhook-configs:/etc/webhook:ro
    command: ["-verbose", "-hooks", "/etc/webhook/hooks.json", "-hotreload"]
    ports:
      - "19000:9000"
    networks:
      - cc-vfs-network
    restart: unless-stopped

  webhook-orchestrator:
    build:
      context: .
      dockerfile: services/webhook-orchestrator/Dockerfile
      secrets:
        - git-credentials
    container_name: cc-vfs-webhook-orchestrator
    depends_on:
      vfs-service:
        condition: service_healthy
      webhook-daemon:
        condition: service_started
    volumes:
      - ./conf/config.local.yaml:/app/config.yaml:ro
    command: ["./webhook-orchestrator", "--conf", "/app/config.yaml"]
    networks:
      - cc-vfs-network
    restart: unless-stopped

  event-worker:
    build:
      context: .
      dockerfile: services/event-worker/Dockerfile
      secrets:
        - git-credentials
    container_name: cc-vfs-event-worker
    depends_on:
      vfs-service:
        condition: service_healthy
    volumes:
      - ./conf/config.local.yaml:/app/config.yaml:ro
    command: ["./event-worker", "--conf", "/app/config.yaml"]
    networks:
      - cc-vfs-network
    restart: unless-stopped
    deploy:
      replicas: 1

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
      secrets:
        - git-credentials
    container_name: cc-vfs-scheduler
    depends_on:
      vfs-service:
        condition: service_healthy
    volumes:
      - ./conf/config.local.yaml:/app/config.yaml:ro
    command: ["./scheduler", "--conf", "/app/config.yaml"]
    networks:
      - cc-vfs-network
    restart: unless-stopped
    deploy:
      replicas: 1

  event-publisher:
    build:
      context: .
      dockerfile: services/event-publisher/Dockerfile
      secrets:
        - git-credentials
    container_name: cc-vfs-event-publisher
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - ./conf/config.local.yaml:/app/config.yaml:ro
    command: ["./event-publisher", "--conf", "/app/config.yaml"]
    ports:
      - "18083:8083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cc-vfs-network
    restart: unless-stopped

  cli:
    build:
      context: .
      dockerfile: cli/Dockerfile
      secrets:
        - git-credentials
    depends_on:
      vfs-service:
        condition: service_healthy
    environment:
      VFS_SERVICE_URL: http://vfs-service:8080
      SYSTEM_ADMIN_TOKEN: local-system-admin
    stdin_open: true
    tty: true
    networks:
      - cc-vfs-network
    profiles:
      - cli

volumes:
  mysql-data:
  localstack-data:

networks:
  cc-vfs-network:
    driver: bridge

secrets:
  git-credentials:
    file: ${HOME}/.git-credentials
