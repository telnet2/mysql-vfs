services:
  mysql:
    image: mysql:8.0
    container_name: cc-vfs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vfs
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - cc-vfs-network

  localstack:
    image: localstack/localstack:latest
    container_name: cc-vfs-localstack
    environment:
      SERVICES: s3
      DEBUG: 1
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "awslocal", "s3", "ls"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cc-vfs-network

  nats:
    image: nats:2.10-alpine
    container_name: cc-vfs-nats
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # HTTP monitoring
    command: ["-js", "-m", "8222"]  # Enable JetStream and monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - cc-vfs-network

  vfs-service:
    build:
      context: .
      dockerfile: services/vfs/Dockerfile
    container_name: cc-vfs-service
    depends_on:
      mysql:
        condition: service_healthy
      localstack:
        condition: service_started
      nats:
        condition: service_healthy
    environment:
      DB_DSN: root:root@tcp(mysql:3306)/vfs?charset=utf8mb4&parseTime=True&loc=Local
      S3_ENDPOINT: http://localstack:4566
      S3_BUCKET: cc-vfs-storage
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_S3_FORCE_PATH_STYLE: "true"
      PORT: 8080
      LOG_LEVEL: debug
      SYSTEM_ADMIN_TOKEN: local-system-admin
      NATS_URL: nats://nats:4222
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cc-vfs-network
    restart: unless-stopped

  webhook-daemon:
    image: almir/webhook:latest
    container_name: cc-vfs-webhook-daemon
    volumes:
      - ./deployments/webhook-configs:/etc/webhook:ro
    command: ["-verbose", "-hooks", "/etc/webhook/hooks.json", "-hotreload"]
    ports:
      - "19000:9000"
    networks:
      - cc-vfs-network
    restart: unless-stopped

  webhook-orchestrator:
    build:
      context: .
      dockerfile: services/webhook-orchestrator/Dockerfile
    container_name: cc-vfs-webhook-orchestrator
    depends_on:
      vfs-service:
        condition: service_healthy
      webhook-daemon:
        condition: service_started
    environment:
      DB_DSN: root:root@tcp(mysql:3306)/vfs?charset=utf8mb4&parseTime=True&loc=Local
      WEBHOOK_DAEMON_URL: http://webhook-daemon:9000
      LOG_LEVEL: debug
    networks:
      - cc-vfs-network
    restart: unless-stopped

  event-worker:
    build:
      context: .
      dockerfile: services/event-worker/Dockerfile
    container_name: cc-vfs-event-worker
    depends_on:
      vfs-service:
        condition: service_healthy
    environment:
      DB_DSN: root:root@tcp(mysql:3306)/vfs?charset=utf8mb4&parseTime=True&loc=Local
      WORKER_CONCURRENCY: 10
      POLL_INTERVAL: 1s
      LOG_LEVEL: debug
    networks:
      - cc-vfs-network
    restart: unless-stopped
    deploy:
      replicas: 1

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    container_name: cc-vfs-scheduler
    depends_on:
      vfs-service:
        condition: service_healthy
    environment:
      DB_DSN: root:root@tcp(mysql:3306)/vfs?charset=utf8mb4&parseTime=True&loc=Local
      SCHEDULER_ID: ${HOSTNAME:-scheduler-1}
      POLL_INTERVAL: 10s
      LOG_LEVEL: debug
    networks:
      - cc-vfs-network
    restart: unless-stopped
    deploy:
      replicas: 1

  event-publisher:
    build:
      context: .
      dockerfile: services/event-publisher/Dockerfile
    container_name: cc-vfs-event-publisher
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
      EVENT_BUFFER_SIZE: 1000
      SSE_MAX_CONNECTIONS: 100
      PORT: 8083
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}  # Set to true in production
    ports:
      - "18083:8083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cc-vfs-network
    restart: unless-stopped

  cli:
    build:
      context: .
      dockerfile: cli/Dockerfile
    depends_on:
      vfs-service:
        condition: service_healthy
    environment:
      VFS_SERVICE_URL: http://vfs-service:8080
      LOG_LEVEL: info
    stdin_open: true
    tty: true
    networks:
      - cc-vfs-network
    profiles:
      - cli

volumes:
  mysql-data:
  localstack-data:

networks:
  cc-vfs-network:
    driver: bridge
