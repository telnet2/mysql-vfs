version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: vfs-mysql
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vfs
      MYSQL_USER: vfs
      MYSQL_PASSWORD: vfs
    ports:
      - "23306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mysql-data:/var/lib/mysql

  metadata:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: metadata
    environment:
      SERVER_ADDR: ":8081"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: vfs
      MYSQL_PASSWORD: vfs
      MYSQL_DATABASE: vfs
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8081"

  content:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: content
    environment:
      SERVER_ADDR: ":8082"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: vfs
      MYSQL_PASSWORD: vfs
      MYSQL_DATABASE: vfs
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8082:8082"

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: scheduler
    environment:
      SERVER_ADDR: ":8083"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: vfs
      MYSQL_PASSWORD: vfs
      MYSQL_DATABASE: vfs
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8083:8083"

  webhook:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: webhook
    environment:
      SERVER_ADDR: ":8084"
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: vfs
      MYSQL_PASSWORD: vfs
      MYSQL_DATABASE: vfs
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8084:8084"

volumes:
  mysql-data:
